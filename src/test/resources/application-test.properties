spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop

spring.jpa.show-sql=false

logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF

app.jwt.secret=${JWT_SECRET:dGVzdC1zZWNyZXQtc2VjcmV0LXNlY3JldC1rZXktMTIzNDU2}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
app.jwt.refresh-expiration-seconds=${JWT_REFRESH_EXPIRATION_SECONDS:604800}

logging.pattern.level=%5p [traceId=%X{traceId}]
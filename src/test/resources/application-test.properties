# READ ORDER NOTE: Runtime config source used by JwtProperties/DataSource.
spring.application.name=course-management
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

spring.cache.type=none
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
#spring.jpa.open-in-view=false
app.jwt.secret=${JWT_SECRET:dGVzdC1zZWNyZXQtc2VjcmV0LXNlY3JldC1rZXktMTIzNDU2}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
logging.pattern.level=%5p [traceId=%X{traceId}]
#spring.web.resources.add-mappings=false
#management.endpoints.web.exposure.include=health,info
#logging.level.root=DEBUG


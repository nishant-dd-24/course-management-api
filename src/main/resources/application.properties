# READ ORDER NOTE: Runtime config source used by JwtProperties/DataSource.
spring.application.name=course-management

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/course_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:course_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
app.jwt.refresh-expiration-seconds=${JWT_REFRESH_EXPIRATION_SECONDS:604800}

logging.pattern.level=%5p [traceId=%X{traceId}]

spring.web.resources.add-mappings=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
#logging.level.root=DEBUG

app.admin.email=admin@example.com
app.admin.password=12345678
app.admin.name=Admin


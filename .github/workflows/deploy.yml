name: Build & Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image (versioned)
        run: |
          docker build -t nishantdd/course-management-api:${{ github.sha }} .

      - name: Push versioned image
        run: |
          docker push nishantdd/course-management-api:${{ github.sha }}

      - name: Tag & push latest
        run: |
          docker tag nishantdd/course-management-api:${{ github.sha }} nishantdd/course-management-api:latest
          docker push nishantdd/course-management-api:latest

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/root/course-management-api"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export IMAGE_TAG=${{ github.sha }}

            docker compose -f /root/course-management-api/docker-compose.yml pull
            docker compose -f /root/course-management-api/docker-compose.yml up -d --force-recreate --remove-orphans
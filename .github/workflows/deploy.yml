name: Build & Deploy to VPS

on:
  push:
    branches:
      - main

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run Unit + Integration Tests
        run: ./mvnw clean verify -Preal

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image (versioned)
        run: |
          docker build -t nishantdd/course-management-api:${{ github.sha }} .

      - name: Push versioned image
        run: |
          docker push nishantdd/course-management-api:${{ github.sha }}

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/root/course-management-api"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            COMPOSE_FILE=/root/course-management-api/docker-compose.yml

            CONTAINER_ID=$(docker compose -f $COMPOSE_FILE ps -q app)

            PREVIOUS_IMAGE=$(docker inspect --format='{{.Config.Image}}' $CONTAINER_ID 2>/dev/null || echo "")

            export IMAGE_TAG=${{ github.sha }}
            
            export SPRING_DATASOURCE_PASSWORD='${{ secrets.SPRING_DATASOURCE_PASSWORD }}'
            export JWT_SECRET='${{ secrets.JWT_SECRET }}'
            export JWT_EXPIRATION_SECONDS='${{ secrets.JWT_EXPIRATION_SECONDS }}'
            export JWT_REFRESH_EXPIRATION_SECONDS='${{ secrets.JWT_REFRESH_EXPIRATION_SECONDS }}'
            export APP_ADMIN_EMAIL='${{ secrets.APP_ADMIN_EMAIL }}'
            export APP_ADMIN_PASSWORD='${{ secrets.APP_ADMIN_PASSWORD }}'
            export APP_ADMIN_NAME='${{ secrets.APP_ADMIN_NAME }}'

            docker compose -f $COMPOSE_FILE pull
            docker compose -f $COMPOSE_FILE up -d --force-recreate --remove-orphans

            for i in {1..12}; do
              if curl -f http://localhost:8080/actuator/health; then
                exit 0
              fi
              sleep 5
            done

            if [ -n "$PREVIOUS_IMAGE" ]; then
              export IMAGE_TAG=${PREVIOUS_IMAGE##*:}
              docker compose -f $COMPOSE_FILE up -d --force-recreate
            fi

            exit 1
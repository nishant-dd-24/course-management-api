name: Build & Deploy to VPS

on:
  push:
    branches:
      - main

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run Unit + Integration Tests
        run: ./mvnw clean verify -Preal

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image (versioned)
        run: |
          docker build -t nishantdd/course-management-api:${{ github.sha }} .

      - name: Push versioned image
        run: |
          docker push nishantdd/course-management-api:${{ github.sha }}

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,nginx.conf"
          target: "/root/course-management-api"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            
            cd /root/course-management-api
            
            COMPOSE_FILE=docker-compose.yml
            NGINX_CONF=nginx.conf
            
            CURRENT=$(grep -o 'app-\(blue\|green\)' $NGINX_CONF | head -n1)
  
            if [ -z "$CURRENT" ]; then
              CURRENT="app-blue"
            fi
            
            if [ "$CURRENT" = "app-blue" ]; then
              TARGET=green
              OLD=blue
            else
              TARGET=blue
              OLD=green
            fi
            
            echo "Current: $CURRENT"
            echo "Deploying to: $TARGET"

            export IMAGE_TAG_${TARGET^^}=${{ github.sha }}
            
            export SPRING_DATASOURCE_PASSWORD='${{ secrets.SPRING_DATASOURCE_PASSWORD }}'
            export JWT_SECRET='${{ secrets.JWT_SECRET }}'
            export JWT_EXPIRATION_SECONDS='${{ secrets.JWT_EXPIRATION_SECONDS }}'
            export JWT_REFRESH_EXPIRATION_SECONDS='${{ secrets.JWT_REFRESH_EXPIRATION_SECONDS }}'
            export APP_ADMIN_EMAIL='${{ secrets.APP_ADMIN_EMAIL }}'
            export APP_ADMIN_PASSWORD='${{ secrets.APP_ADMIN_PASSWORD }}'
            export APP_ADMIN_NAME='${{ secrets.APP_ADMIN_NAME }}'

            docker compose -f $COMPOSE_FILE --profile $TARGET up -d app-$TARGET
            
            if ! docker ps --format '{{.Names}}' | grep -q '^course-nginx$'; then
              docker compose up -d nginx
            fi
            
            SUCCESS=false
            
            echo "Waiting for health check..."
            
            for i in {1..20}; do
              echo "Attempt $i..."
              if docker exec course-nginx curl -f http://app-$TARGET:8080/actuator/health/readiness; then
                SUCCESS=true
                break
              fi
              sleep 5
            done
            
            if [ "$SUCCESS" != "true" ]; then
              echo "New version failed health check"
              docker compose rm -f app-$TARGET
              echo "Rollback: keeping $OLD live"
              exit 1
            fi
            
            sed -i "s/app-$OLD/app-$TARGET/" $NGINX_CONF

            docker exec course-nginx nginx -t || exit 1
            docker exec course-nginx nginx -s reload || exit 1

            docker compose stop app-$OLD
            docker compose rm -f app-$OLD

            echo "Deployment complete"